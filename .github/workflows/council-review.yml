# Drop this file into any repo to enable /council-review comments.
# Only requires one secret: BUILDKITE_API_TOKEN
# All other secrets (OpenAI, Jira, GitHub) are stored in Buildkite.

name: Council PR Review

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/council-review')
    runs-on: ubuntu-latest

    steps:
      - name: React to comment
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Buildkite pipeline
        run: |
          curl -sS -X POST \
            "https://api.buildkite.com/v2/organizations/${BUILDKITE_ORG}/pipelines/council-pr-review/builds" \
            -H "Authorization: Bearer ${BUILDKITE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"commit\": \"HEAD\",
              \"branch\": \"main\",
              \"message\": \"Review PR #${{ github.event.issue.number }} on ${{ github.repository }}\",
              \"env\": {
                \"REVIEW_REPO\": \"${{ github.repository }}\",
                \"REVIEW_PR\": \"${{ github.event.issue.number }}\"
              }
            }"
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
          BUILDKITE_ORG: twilio
